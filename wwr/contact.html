<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="This webpage contains out contact information. Feel free to contact us.">
    <meta name="author" content="Matias Ponce">
    <title>Contact Us, WRafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="Company logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="contact">
            <h1>WRafting Company</h1>
            <div>
                <span>6767 Messi Avenue</span>
                <span>Miami,Florida</span>
                <span>+1 123 123 1234</span>
                <span>contact@WRafting.com</span>
            </div>
        </div>
        <div class="division">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d6042.51259420288!2d-80.2457056508261!3d25.773883390823542!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses!2suy!4v1775266721469!5m2!1ses!2suy"
              width="600" height="450" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>
            <form>
                <div class="form-row">
                    <label for="name">Name</label>
                    <input type="text" name="name" id="name">
                </div>
                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="email">
                </div>
                <div class="form-row">
                    <span>Message Purpose</span>
                    <div class="radio">
                        <label for="general">General Inquiry</label>
                        <input type="radio" name="purpose" id="general">
                        <label for="reservation">Reservation Question</label>
                        <input type="radio" name="purpose" id="reservation">
                        <label for="suggestion">Website Suggestion</label>
                        <input type="radio" name="purpose" id="suggestion">
                    </div>
                </div>
                <div class="form-row">
                    <label for="message">Message</label>
                    <textarea name="message" id="message"></textarea>
                </div>
                <div class="checkbox">
                    <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                    <input type="checkbox" name="subscribe" id="subscribe">
                </div>
                <button type="submit">Get in touch!</button>
            </form>
        </div>
        <section class="serve">
            <h2>We Are Here to Serve You!</h2>
            <figure>
                <img src="images/employee-1.avif" alt="Joao Pedro">
                <figcaption>Joao Pedro</figcaption>
            </figure>
            <figure>
                <img src="images/employee-2.avif" alt="Lucas Hugo">
                <figcaption>Lucas Hugo</figcaption>
            </figure>
            <figure>
                <img src="images/employee-3.avif" alt="Luis Suarez">
                <figcaption>Luis Suarez</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>&copy;2026-WRafting-Matias Ponce</p>
        <nav class="socialmedia">
            <a href="https://instagram.com">
                <img src="images/instagram.webp" alt="Instagram">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-square.svg" alt="Linkedin">
            </a>
            <a href="https://youtube.com">
                <img src="images/youtube-square.svg" alt="Youtube">
            </a>
        </nav>
    </footer>

</body>

</html>
