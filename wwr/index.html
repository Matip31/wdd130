<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="This page has the home page for the organization WRafting. It shows our adventures and includes a form to sign up to our newsletter!">
    <meta name="author" content="Matias Ponce">
    <title>WRafting Home Page</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="Company logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="hero home">
            <img src="images/home-image.avif" alt="Background picture">
            <h1>WRafting</h1>
            <article>
                <a href="trips.html">Come have an adventure!</a>
            </article>
        </div>
        <section class="newsletter">
            <h1>Register to our Newsletter to get the latest news!</h1>
            <form>
                <div class="form-row">
                    <label for="name">Name:</label>
                    <input type="text" name="name" id="name">
                </div>
                <div class="form-row">
                    <label for="email">Email:</label>
                    <input type="email" name="email" id="email">
                </div>
                <button type="submit">Register</button>
            </form>
        </section>
        <section class="offers">
            <h2>You can choose your adventure!</h2>
            <figure>
                <img src="images/river.avif" alt="Calm river">
                <figcaption>Come chill!</figcaption>
            </figure>
            <figure>
                <img src="images/rapids.avif" alt="Rapids">
                <figcaption>Have an adventure!</figcaption>
            </figure>
            <figure>
                <img src="images/friends.avif" alt="friends">
                <figcaption>Come make friends!</figcaption>
            </figure>
        </section>

    </main>
    <footer>
        <p>&copy;2026-WRafting-Matias Ponce</p>
        <nav class="socialmedia">
            <a href="https://instagram.com">
                <img src="images/instagram.webp" alt="Instagram">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-square.svg" alt="Linkedin">
            </a>
            <a href="https://youtube.com">
                <img src="images/youtube-square.svg" alt="Youtube">
            </a>
        </nav>
    </footer>
</body>

</html>
