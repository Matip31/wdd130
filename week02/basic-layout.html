<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A basic HTML structure example using semantic HTML elements">
    <meta name="author" content="Matias Ponce">
    <title>Basic HTML Structure</title>
</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="A basic logo" width="128" height="128">
    </header>
    <nav>
        <ul>
            <li>
                <a href="https://www.minecraft.net/"></a>
            </li>
            <li>
                <a href="https://www.churchofjesuschrist.org"></a>
            </li>
        </ul>
    </nav>
    <main>
        <h1>Basic HTML structure</h1>
        <section>
            <h2>Heading</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Illum, tempore.</p>
        </section>
        <section>
            <h2>Heading2</h2>
            <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Atque, voluptate.</p>
        </section>
    </main>
    <aside>
        <img
          src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/montevideo-uruguay/800x500/montevideo-uruguay-mormon-temple-933183-wallpaper.jpg"
          alt="Uruguay Temple" width="200">
    </aside>
    <footer>
        <p>Matias Ponce</p>
    </footer>
</body>

</html>
